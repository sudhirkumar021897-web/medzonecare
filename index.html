<!DOCTYPE html>

<head>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins', sans-serif;
}

body{
background:#0d0d0d;
color:#fff;
line-height:1.6;
}

/* NAVIGATION */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
background:#000;
position:fixed;
width:100%;
top:0;
z-index:1000;
box-shadow:0 2px 10px rgba(255,0,0,0.3);
}

nav h2{
color:#ff0000;
font-weight:800;
font-size:24px;
}

nav ul{
display:flex;
list-style:none;
}

nav ul li{
margin-left:30px;
}

nav ul li a{
text-decoration:none;
color:#fff;
font-weight:500;
transition:0.3s;
}

nav ul li a:hover{
color:#ff0000;
}

/* HERO SECTION */
.hero{
height:100vh;
background:url('hero.jpg') center/cover no-repeat
