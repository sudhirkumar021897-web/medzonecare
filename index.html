<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Medzone Health Care Advisors | One Zone For Healthcare</title>

<meta name="description" content="Medzone Health Care Advisors provides NABH accreditation, hospital compliance, empanelment, Fire NOC, Pollution Control and healthcare IT solutions.">

<meta property="og:title" content="Medzone Health Care Advisors">
<meta property="og:description" content="NABH Accreditation, Hospital Compliance & Healthcare Consultancy.">
<meta property="og:type" content="website">
<meta property="og:image" content="https://medzonecare.com/images/logo.png">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>

html{scroll-behavior:smooth;}

:root{
--primary:#0f172a;
--gold:#c9a227;
--light:#f4f8fc;
--text:#1e293b;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
color:var(--text);
line-height:1.7;
background:white;
}

/* NAVIGATION */
nav{
background:var(--primary);
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

/* Prevent brand merging */
.logo-area{
display:flex;
align-items:center;
gap:15px;
color:white;
flex:1;
}

.logo-area img{
height:55px;
}

.brand-text{
white-space:nowrap;
}

.brand-text h1{
font-family:'Playfair Display',serif;
font-size:22px;
color:white;
}

.brand-text p{
color:var(--gold);
font-weight:600;
font-size:14px;
}

/* MENU */
nav ul{
display:flex;
list-style:none;
gap:25px;
}

nav ul li a{
color:white;
text-decoration:none;
font-size:14px;
letter-spacing:1px;
}

/* MOBILE TOGGLE */
.menu-toggle{
display:none;
font-size:28px;
color:white;
cursor:pointer;
}

/* HERO */
.hero{
height:90vh;
background:linear-gradient(rgba(15,23,42,0.85),rgba(15,23,42,0.85)),
url('images/hero.jpg');
background-size:cover;
background-position:center;
display:flex;
align-items:center;
padding:0 8%;
color:white;
}

.hero-content{max-width:750px;}

.hero h2{
font-family:'Playfair Display',serif;
font-size:48px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
margin-bottom:30px;
}

.btn{
background:var(--gold);
color:black;
padding:14px 35px;
text-decoration:none;
font-weight:600;
border-radius:4px;
display:inline-block;
}

/* SECTION */
.section{padding:100px 10%;text-align:center;}
.light-bg{background:var(--light);}

.section h2{
font-family:'Playfair Display',serif;
font-size:40px;
margin-bottom:50px;
color:var(--primary);
}

/* WHY CHOOSE */
.why-box{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
}

.why-item{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* FAQ */
.faq-item{
max-width:800px;
margin:20px auto;
text-align:left;
}

.faq-item h4{
margin-bottom:10px;
color:var(--primary);
}

/* SERVICES */
.services{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:35px;
}

.service-card{
background:white;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
overflow:hidden;
transition:0.3s;
}

.service-card:hover{transform:translateY(-6px);}
.service-card img{width:100%;height:220px;object-fit:cover;}
.service-content{padding:25px;}
.service-content h3{font-size:22px;margin-bottom:12px;color:var(--primary);}
.service-content p{font-size:15px;}

/* ABOUT */
.about-content{
max-width:900px;
margin:auto;
font-size:18px;
}

/* CONTACT */
.contact-form{
max-width:600px;
margin:0 auto;
}

.contact-form input,
.contact-form textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-family:'Poppins';
}

.contact-form button{
background:var(--gold);
border:none;
padding:12px 30px;
font-weight:600;
cursor:pointer;
}

/* FOOTER */
footer{
background:#0b1220;
color:white;
padding:50px 10%;
text-align:center;
}

/* WHATSAPP */
.whatsapp-float{
position:fixed;
bottom:25px;
right:25px;
z-index:1000;
}

.whatsapp-float img{
width:60px;
height:60px;
transition:0.3s;
}

.whatsapp-float img:hover{
transform:scale(1.1);
}

/* RESPONSIVE */
@media(max-width:992px){
.services{grid-template-columns:repeat(2,1fr);}
.why-box{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:768px){

.menu-toggle{
display:block;
margin-left:auto;
}

nav ul{
position:absolute;
top:100%;
left:0;
width:100%;
background:var(--primary);
flex-direction:column;
align-items:center;
max-height:0;
overflow:hidden;
transition:max-height 0.4s ease;
}

nav ul.show{
max-height:400px;
padding:20px 0;
}

nav ul li{
margin:15px 0;
}

.services{grid-template-columns:1fr;}
.why-box{grid-template-columns:1fr;}
.hero h2{font-size:30px;}

.brand-text h1{
font-size:18px;
}

}

</style>
</head>

<body>

<nav>
<div class="logo-area">
<img src="images/logo.png" alt="Medzone Logo">
<div class="brand-text">
<h1>Medzone Health Care Advisors</h1>
<p><strong>"One Zone For Healthcare"</strong></p>
</div>
</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<ul id="nav-links">
<li><a href="#">Home</a></li>
<li><a href="#services">Services</a></li>
<li><a href="#about">About</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>

<p>Your trusted partner for accreditation, empanelment and regulatory excellence.</p>
<a href="#contact" class="btn">Book Consultation</a>
</div>
</header>

<!-- SERVICES -->

<script>

function toggleMenu(){
navLinks.classList.toggle("show");
}

document.querySelectorAll("#nav-links a").forEach(link => {
link.addEventListener("click", () => {
navLinks.classList.remove("show");
});
});
</script>

</body>
</html>
