<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medzone Healthcare Advisors</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--primary:#e10600;
--dark:#111;
--gray:#666;
--light:#f8f9fc;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fff;
color:var(--dark);
}

.container{
width:90%;
max-width:1200px;
margin:auto;
}

/* NAVBAR */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 0;
}

.logo{
font-weight:800;
font-size:22px;
color:var(--primary);
}

nav ul{
display:flex;
list-style:none;
gap:35px;
}

nav a{
text-decoration:none;
color:var(--dark);
font-weight:500;
transition:.3s;
}

nav a:hover{
color:var(--primary);
}

/* HERO */
.hero{
padding:80px 0 120px;
display:flex;
align-items:center;
justify-content:space-between;
gap:50px;
flex-wrap:wrap;
}

.hero-left{
flex:1;
min-width:300px;
}

.hero-left h1{
font-size:52px;
line-height:1.2;
font-weight:800;
margin-bottom:25px;
}

.hero-left p{
color:var(--gray);
font-size:18px;
margin-bottom:35px;
max-width:500px;
}

.btn{
display:inline-block;
padding:14px 30px;
border-radius:6px;
text-decoration:none;
font-weight:600;
margin-right:15px;
transition:.3s;
}

.btn-primary{
background:var(--primary);
color:#fff;
}

.btn-primary:hover{
background:#b30000;
}

.btn-outline{
border:2px solid var(--primary);
color:var(--primary);
}

.btn-outline:hover{
background:var(--primary);
color:#fff;
}

.hero-right{
flex:1;
min-width:300px;
position:relative;
}

.hero-right img{
width:100%;
border-radius:12px;
box-shadow:0 20px 50px rgba(0,0,0,.15);
}

/* SERVICES SECTION */
.section{
padding:100px 0;
background:var(--light);
}

.section h2{
text-align:center;
font-size:38px;
margin-bottom:60px;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:40px;
}

.service-card{
background:#fff;
padding:40px 30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.3s;
}

.service-card:hover{
transform:translateY(-8px);
box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.service-card img{
width:70px;
margin-bottom:20px;
}

.service-card h3{
margin-bottom:15px;
font-size:20px;
}

.service-card p{
color:var(--gray);
font-size:15px;
}

/* ABOUT */
.about{
padding:100px 0;
display:flex;
align-items:center;
justify-content:space-between;
gap:50px;
flex-wrap:wrap;
}

.about img{
flex:1;
min-width:300px;
border-radius:12px;
box-shadow:0 20px 40px rgba(0,0,0,.1);
}

.about-text{
flex:1;
min-width:300px;
}

.about-text h2{
font-size:36px;
margin-bottom:20px;
}

.about-text p{
color:var(--gray);
margin-bottom

</body>
</html>
